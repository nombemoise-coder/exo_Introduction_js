<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Formulaire Js</title>
    </head>
    <body>
        <section>
            <article>
                <form method="post" action="exo_js.html" enctype="multipart/form-data">
                    <label for="nom">Nom :</label>
                    <input type="text" name="nom" id="nom" placeholder="EX : Nombe">
                    <br><br>
                    <label for="prenom">Prénom :</label>
                    <input type="text" name="prenom" id="prenom" placeholder="EX : Moïse">
                    <br><br>
                    <label for="dateAge">Date de naissance :</label>
                    <input type="date" name="dateAge" id="dateAge">
                    <br><br>
                    <input type="submit" value="Valider" class="value">
                </form>
                <script>
                    let btn = document.querySelector(".value");
                    btn.addEventListener("click", (event) => {
                        event.preventDefault()
                        function calculerAge() {
                            const dateNaissance = document.getElementById("dateAge").valueAsDate;
                            const aujourdHui = new Date();

                            let age = aujourdHui.getFullYear() - dateNaissance.getFullYear();
                            const mois = aujourdHui.getMonth() - dateNaissance.getMonth();
                            const jour = aujourdHui.getDate() - dateNaissance.getDate();


                            //Vérifie si l'anniversaire est déjà passé et retire 1 an à l'âge calculé
                            // si ce n'est pas le cas (Incrémentation)

                            if (mois < 0 || (mois === 0 && jour < 0)) age--;

                            return age;
                        }
                    let nom = document.querySelector("#nom").value
                    let prenom = document.querySelector("#prenom").value
                    let age = calculerAge()
                    alert("Bonjour : \n " +nom+ "\n" +prenom+ "\n"+age+" ans.");
                    } )
                </script>
            </article>
        </section>
    </body>
</html>
